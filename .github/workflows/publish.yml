name: Publish

on:
  workflow_dispatch:
  # Uncomment the lines below to enable automatic deploy on merge to main:
  # push:
  #   branches:
  #     - main

permissions:
  contents: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  publish:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          cname: sfdevops.info